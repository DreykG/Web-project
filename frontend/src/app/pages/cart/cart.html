<p>Cart</p>

@for (item of cartItems; track item.id) {
    <div class="item-card">
        {{item.name}}
        {{item.price}}
        <button class="removeBtn" (click)="removeFromCart(item.id)">Remove from Cart</button>
    </div>     
} @empty {
    <p>Cart items not found</p>
}

<button class="buyBtn" (click)="buyCart()">Buy all Cart Items</button>
