<div class="login-container">
  <h2>Login</h2>

  <input
    type="text"
    placeholder="Login"
    [(ngModel)]="username"
    name="username"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
    name="password"
  />

  <button (click)="onLogin()">Enter</button>

  <button routerLink="/register">Don't have an account?</button>

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }
</div>
